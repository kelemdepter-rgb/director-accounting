name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      # The repo has a pre-existing peer-dep mismatch
      # (react-test-renderer wants react@^19.2.6 but the rest of the
      # toolchain pins react@19.1.0). `npm ci` honours the lockfile but
      # still validates peers, so use --legacy-peer-deps to mirror local.
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
